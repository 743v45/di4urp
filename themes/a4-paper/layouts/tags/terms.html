{{ define "main" }}
<div class="paper">
  {{ partial "header.html" . }}
  <div class="terms-page">
    <h1>Tags</h1>
    <ul>
      {{ range .Data.Terms.Alphabetical }}
      <li><a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a> ({{ .Count }})</li>
      {{ end }}
    </ul>
  </div>
  {{ partial "footer.html" . }}
</div>
{{ end }}
