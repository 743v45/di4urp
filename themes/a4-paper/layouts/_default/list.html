{{ define "main" }}

<div id="a4-src" style="visibility:hidden;position:absolute;pointer-events:none;width:714px;left:-9999px;">
  {{ range .Data.Pages.GroupByDate "2006-01" }}
  <h3 class="month-heading">{{ dateFormat "2006年01月" (printf "%s-01" .Key) }}</h3>
  <ul class="post-list">
    {{ range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <time>{{ .PublishDate.Format "2006-01-02" }}</time>
    </li>
    {{ end }}
  </ul>
  {{ end }}
</div>
<div id="a4-pages"></div>

<script src="{{ (resources.Get "js/paginate.js" | minify | fingerprint).RelPermalink }}"></script>
<script>
document.documentElement.setAttribute('data-attribution', '© {{ now.Year }} {{ .Site.Params.author }}');
document.addEventListener('DOMContentLoaded', function() {
  A4Paginate(
    document.getElementById('a4-src'),
    document.getElementById('a4-pages'),
    document.getElementById('a4-header').innerHTML
  );
});
</script>
<div id="a4-header" style="display:none">
  {{ partial "header.html" . }}
</div>

{{ end }}
